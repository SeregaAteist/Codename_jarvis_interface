[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.lint.per-file-ignores]
"modules/rafail/db/seed.py" = ["E501"]  # long prompt strings in triple-quoted literals

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
