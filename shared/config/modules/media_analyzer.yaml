# Конфиг бота media_analyzer (Фаза 1). Секреты — в корневом .env, НЕ здесь.
# Новый бот = новый файл modules/<name>.yaml, чужие настройки не трогает.

telegram:
  token_env: TELEGRAM_BOT_TOKEN   # имя переменной .env с токеном (мульти-бот: у каждого свой)

llm:
  gemini_model: gemini-2.5-flash
  gemini_fallback_model: gemini-2.5-pro
  claude_model: claude-fable-5
  ollama_model: llama3.2
  # Роли → провайдер/модель (использует LLM-роутер, Фаза 3).
  # "architect" — алиас на реальный API-id claude-fable-5 одной строкой.
  roles:
    quick_analysis: gemini/gemini-2.5-flash
    architect: claude/claude-fable-5
    local_chat: ollama/llama3.2

media:
  batch_timeout: 8
  max_image_size: 4194304   # 4 MB

executor: ssh   # default — рабочий SSH-поток; local включается отдельным шагом
