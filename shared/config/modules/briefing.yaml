# Конфиг утреннего брифинга (Фаза 11). Секретов нет — токен/owner берутся из .env (CFG).
reddit:
  subreddits:
    - artificial
    - MachineLearning
    - LocalLLaMA
  limit: 5
  min_score: 50   # ⚠️ не применяется: Reddit RSS не отдаёт score (top.json = 403). Резерв под OAuth API.
  hours: 24

summarizer:
  role: quick_analysis
  max_tokens: 500
